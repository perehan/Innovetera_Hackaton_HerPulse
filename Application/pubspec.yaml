import 'package:flutter/material.dart';
import '../../models/emergency_contact.dart';
import '../../services/api_service.dart';
import '../../widgets/pastel_background.dart';

class EmergencyContactsScreen extends StatefulWidget {
  const EmergencyContactsScreen({super.key});
  @override State<EmergencyContactsScreen> createState() => _EmergencyContactsScreenState();
}

class _EmergencyContactsScreenState extends State<EmergencyContactsScreen> {
  final _api = ApiService();
  List<EmergencyContact> _contacts = [];
  bool _showForm = false;
  final _nameCtrl = TextEditingController();
  final _relCtrl = TextEditingController();
  final _phoneCtrl = TextEditingController();
  final _emailCtrl = TextEditingController();

  @override void initState() { super.initState(); _load(); }
  Future<void> _load() async { try { final c = await _api.getEmergencyContacts(); setState(() => _contacts = c); } catch (_) {} }

  Future<void> _save() async {
    if (_nameCtrl.text.isEmpty || _emailCtrl.text.isEmpty) return;
    await _api.createEmergencyContact(EmergencyContact(name: _nameCtrl.text,
      relationship: _relCtrl.text.isEmpty ? null : _relCtrl.text,
      phone: _phoneCtrl.text.isEmpty ? null : _phoneCtrl.text, email: _emailCtrl.text));
    _nameCtrl.clear(); _relCtrl.clear(); _phoneCtrl.clear(); _emailCtrl.clear();
    setState(() => _showForm = false); _load();
  }

  @override
  Widget build(BuildContext context) {
    return PastelBackground(
      child: SafeArea(
        child: SingleChildScrollView(
          padding: const EdgeInsets.fromLTRB(20, 24, 20, 100),
          child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
            Row(children: [
              const Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                Text('Emergency Contacts', style: TextStyle(fontSize: 20, fontWeight: FontWeight.w800, color: Color(0xFF500820))),
                Text('Who to alert in an emergency', style: TextStyle(fontSize: 12, color: Color(0xFF6B6B7A))),
              ]),
              const Spacer(),
              GestureDetector(onTap: () => setState(() => _showForm = !_showForm),
                child: Container(padding: const EdgeInsets.all(10),
                  decoration: BoxDecoration(color: const Color(0xFF500820), borderRadius: BorderRadius.circular(14)),
                  child: Icon(_showForm ? Icons.close : Icons.add, color: Colors.white, size: 20))),
            ]),
            if (_showForm) ...[
              const SizedBox(height: 16),
              Container(padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(color: Colors.white.withOpacity(0.75), borderRadius: BorderRadius.circular(20)),
                child: Column(children: [
                  TextField(controller: _nameCtrl, decoration: const InputDecoration(labelText: 'Name *', border: OutlineInputBorder())),
                  const SizedBox(height: 10),
                  TextField(controller: _relCtrl, decoration: const InputDecoration(labelText: 'Relationship', border: OutlineInputBorder())),
                  const SizedBox(height: 10),
                  TextField(controller: _phoneCtrl, decoration: const InputDecoration(labelText: 'Phone', border: OutlineInputBorder())),
                  const SizedBox(height: 10),
                  TextField(controller: _emailCtrl, decoration: const InputDecoration(labelText: 'Email *', border: OutlineInputBorder())),
                  const SizedBox(height: 14),
                  SizedBox(width: double.infinity, child: ElevatedButton(onPressed: _save,
                    style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF500820), padding: const EdgeInsets.symmetric(vertical: 14)),
                    child: const Text('Add Contact', style: TextStyle(color: Colors.white)))),
                ])),
            ],
            const SizedBox(height: 20),
            ..._contacts.map((c) => Container(
              margin: const EdgeInsets.only(bottom: 12), padding: const EdgeInsets.all(16),
              decoration: BoxDecoration(color: Colors.white.withOpacity(0.75), borderRadius: BorderRadius.circular(20),
                border: Border.all(color: const Color(0xFFF7B6D2).withOpacity(0.5))),
              child: Row(children: [
                Container(width: 44, height: 44,
                  decoration: BoxDecoration(color: const Color(0xFF9A1A38).withOpacity(0.1), borderRadius: BorderRadius.circular(14)),
                  child: const Icon(Icons.person, color: Color(0xFF9A1A38))),
                const SizedBox(width: 14),
                Expanded(child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                  Text(c.name, style: const TextStyle(fontSize: 14, fontWeight: FontWeight.w700, color: Color(0xFF500820))),
                  if (c.relationship != null) Text(c.relationship!, style: const TextStyle(fontSize: 12, color: Color(0xFF6B6B7A))),
                  Text(c.email, style: const TextStyle(fontSize: 12, color: Color(0xFF9A1A38))),
                ])),
                if (c.id != null) IconButton(onPressed: () async { await _api.deleteEmergencyContact(c.id!); _load(); },
                  icon: const Icon(Icons.delete_outline, color: Color(0xFFC86878), size: 20)),
              ]),
            )),
          ]),
        ),
      ),
    );
  }
}
